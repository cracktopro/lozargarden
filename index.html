<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="LozarGarden — Tu huerto kawaii: plantas, diario, tratamientos y más">
  <meta name="theme-color" content="#b8e6c8">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("lozargarden-theme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
        else if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.dataset.theme = "dark";
      } catch (e) {}
    })();
  </script>
  <title>LozarGarden</title>
  <link rel="icon" type="image/png" href="icons/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="./css/kawaii.css" rel="stylesheet">
  <link href="./css/macetadora.css" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js"
    }
  }
  </script>
</head>
<body>
  <div id="auth-screen">
    <div id="auth-container"></div>
  </div>

  <div id="app-shell" class="d-none">
    <a href="#main-content" class="visually-hidden-focusable skip-link">Saltar al contenido</a>

    <header class="app-header">
      <div class="container-fluid px-3 px-lg-4">
        <div class="d-flex align-items-center justify-content-between py-2">
          <a class="brand d-flex align-items-center gap-2 text-decoration-none" href="#" data-view="dashboard">
            <img src="icons/logo.png" class="brand-logo" alt="LozarGarden">
            <span class="brand-text">Lozar<span class="brand-accent">Garden</span></span>
          </a>
          <button class="btn btn-kawaii btn-sm d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#navOffcanvas" aria-label="Abrir menú">
            <i class="bi bi-list"></i>
          </button>
        </div>
      </div>
    </header>

    <div class="app-layout">
      <nav class="sidebar d-none d-lg-flex flex-column" aria-label="Navegación principal">
        <ul class="nav flex-column gap-1" id="sidebar-nav"></ul>
      </nav>

      <div class="offcanvas offcanvas-start sidebar-offcanvas" tabindex="-1" id="navOffcanvas" aria-labelledby="navOffcanvasLabel">
        <div class="offcanvas-header">
          <h2 class="offcanvas-title h5 d-flex align-items-center gap-2" id="navOffcanvasLabel">
            <img src="icons/logo.png" class="offcanvas-logo" alt=""> Menú
          </h2>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body pt-0">
          <ul class="nav flex-column gap-1" id="mobile-nav"></ul>
        </div>
      </div>

      <main id="main-content" class="main-content" tabindex="-1">
        <div class="container-fluid px-3 px-lg-4 py-3 py-lg-4">
          <div id="view-container" aria-live="polite"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <div class="modal fade" id="appModal" tabindex="-1" aria-labelledby="appModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
      <div class="modal-content kawaii-modal">
        <div class="modal-header">
          <h2 class="modal-title h5" id="appModalLabel">Modal</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="appModalBody"></div>
        <div class="modal-footer" id="appModalFooter"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="photoGalleryModal" tabindex="-1" aria-labelledby="photoGalleryLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content kawaii-modal photo-gallery-modal">
        <div class="modal-header">
          <h2 class="modal-title h5" id="photoGalleryLabel">Fotos</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body p-0">
          <div id="photoGalleryCarousel" class="carousel slide" data-bs-interval="false">
            <div class="carousel-inner" id="photoGalleryInner"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#photoGalleryCarousel" data-bs-slide="prev" aria-label="Foto anterior">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#photoGalleryCarousel" data-bs-slide="next" aria-label="Foto siguiente">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="photo-gallery-counter text-center py-2 small" id="photoGalleryCounter"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
